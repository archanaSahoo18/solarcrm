# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/solarcrm_prod?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# FILE STORAGE
# ===============================
file.upload-dir=/opt/solarcrm/uploads

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ===============================
# SECURITY
# ===============================
app.jwt.secret=MySuperSecretKeyForSolarCrmProject1234567890
#app.cors.allowed-origins=https://yourdomain.com